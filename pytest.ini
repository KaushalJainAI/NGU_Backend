[pytest]
# Default to the dedicated test settings (SQLite + TESTING guard), never the
# production settings — bare `pytest` must not touch a real/remote database.
# Override the DB with TEST_DB=postgres to run against the local docker Postgres.
DJANGO_SETTINGS_MODULE = spices_backend.test_settings
python_files = tests.py test_*.py *_tests.py
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
